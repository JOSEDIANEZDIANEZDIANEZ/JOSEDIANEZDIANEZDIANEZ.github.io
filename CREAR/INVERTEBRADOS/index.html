<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Editor de Baraja</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d0d0d;
    --surface: #161616;
    --surface2: #1e1e1e;
    --border: #2a2a2a;
    --accent: #e8ff00;
    --accent2: #ff6b35;
    --text: #f0f0f0;
    --muted: #666;
    --correct: #39d353;
    --wrong: #ff4c4c;
    --radius: 4px;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 20px 60px;
  }

  /* Noise overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 999;
    opacity: 0.4;
  }

  .header {
    width: 100%;
    max-width: 680px;
    margin-bottom: 40px;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
    padding-bottom: 20px;
  }

  .header h1 {
    font-size: clamp(2rem, 5vw, 3.2rem);
    font-weight: 800;
    line-height: 1;
    letter-spacing: -2px;
  }

  .header h1 span {
    color: var(--accent);
  }

  .header .subtitle {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.7rem;
    color: var(--muted);
    text-align: right;
    line-height: 1.6;
  }

  .main {
    width: 100%;
    max-width: 680px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  /* CARD */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 28px;
    position: relative;
    transition: border-color 0.2s;
  }

  .card:focus-within {
    border-color: var(--accent);
  }

  .card-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 22px;
  }

  .card-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.65rem;
    color: var(--accent);
    letter-spacing: 3px;
    text-transform: uppercase;
  }

  .counter-badge {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.75rem;
    color: var(--muted);
    background: var(--surface2);
    border: 1px solid var(--border);
    padding: 3px 10px;
    border-radius: 20px;
  }

  .counter-badge span {
    color: var(--text);
    font-weight: 600;
  }

  /* FIELDS */
  .field {
    display: flex;
    flex-direction: column;
    gap: 6px;
    margin-bottom: 14px;
  }

  .field:last-child { margin-bottom: 0; }

  .field label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.6rem;
    color: var(--muted);
    letter-spacing: 2px;
    text-transform: uppercase;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .field label .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    display: inline-block;
    flex-shrink: 0;
  }

  .dot-q  { background: #888; }
  .dot-ok { background: var(--correct); }
  .dot-no { background: var(--wrong); }
  .dot-no2 { background: var(--accent2); }

  .field input {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    font-size: 0.95rem;
    font-weight: 600;
    padding: 11px 14px;
    outline: none;
    transition: border-color 0.15s, background 0.15s;
    width: 100%;
    letter-spacing: 0.3px;
  }

  .field input:focus {
    border-color: var(--accent);
    background: #202020;
  }

  .field input::placeholder {
    color: #3a3a3a;
    font-weight: 400;
  }

  /* NAV + ACTIONS */
  .controls {
    display: flex;
    gap: 8px;
    align-items: center;
    flex-wrap: wrap;
  }

  .btn {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 0.78rem;
    letter-spacing: 1px;
    text-transform: uppercase;
    border: none;
    border-radius: var(--radius);
    cursor: pointer;
    padding: 10px 18px;
    transition: all 0.15s;
    display: inline-flex;
    align-items: center;
    gap: 7px;
  }

  .btn-nav {
    background: var(--surface2);
    color: var(--text);
    border: 1px solid var(--border);
  }

  .btn-nav:hover:not(:disabled) {
    border-color: var(--accent);
    color: var(--accent);
  }

  .btn-nav:disabled {
    opacity: 0.25;
    cursor: not-allowed;
  }

  .btn-add {
    background: var(--surface2);
    color: var(--accent);
    border: 1px solid var(--accent);
    margin-left: auto;
  }

  .btn-add:hover {
    background: var(--accent);
    color: #000;
  }

  .btn-delete {
    background: transparent;
    color: var(--wrong);
    border: 1px solid #3a1a1a;
  }

  .btn-delete:hover {
    background: var(--wrong);
    color: #fff;
    border-color: var(--wrong);
  }

  .btn-generate {
    width: 100%;
    background: var(--accent);
    color: #000;
    font-size: 0.9rem;
    font-weight: 800;
    padding: 16px 24px;
    justify-content: center;
    letter-spacing: 2px;
    margin-top: 8px;
    position: relative;
    overflow: hidden;
  }

  .btn-generate::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
    transform: translateX(-100%);
    transition: transform 0.4s;
  }

  .btn-generate:hover::after {
    transform: translateX(100%);
  }

  .btn-generate:hover {
    background: #f0ff20;
  }

  /* LIST PREVIEW */
  .list-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px 28px;
  }

  .list-header {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.6rem;
    color: var(--muted);
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 14px;
  }

  .list-empty {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.75rem;
    color: #333;
    text-align: center;
    padding: 20px 0;
  }

  .list-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 0;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    transition: all 0.1s;
  }

  .list-item:last-child { border-bottom: none; }

  .list-item:hover .list-pregunta {
    color: var(--accent);
  }

  .list-item.active .list-pregunta {
    color: var(--accent);
  }

  .list-num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.6rem;
    color: var(--muted);
    min-width: 24px;
  }

  .list-pregunta {
    font-weight: 700;
    font-size: 0.85rem;
    flex: 1;
    transition: color 0.15s;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .list-tags {
    display: flex;
    gap: 5px;
    flex-shrink: 0;
  }

  .tag {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.55rem;
    padding: 2px 7px;
    border-radius: 20px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 100px;
  }

  .tag-ok {
    background: rgba(57,211,83,0.12);
    color: var(--correct);
    border: 1px solid rgba(57,211,83,0.2);
  }

  .tag-no {
    background: rgba(255,76,76,0.1);
    color: var(--wrong);
    border: 1px solid rgba(255,76,76,0.2);
  }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 30px;
    right: 30px;
    background: var(--accent);
    color: #000;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.75rem;
    font-weight: 600;
    padding: 12px 20px;
    border-radius: var(--radius);
    transform: translateY(80px);
    opacity: 0;
    transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    z-index: 9999;
    letter-spacing: 1px;
  }

  .toast.show {
    transform: translateY(0);
    opacity: 1;
  }

  .divider {
    height: 1px;
    background: var(--border);
    margin: 4px 0;
  }

  .btn svg {
    width: 14px;
    height: 14px;
    stroke-width: 2.5;
  }
</style>
</head>
<body>

<div class="header">
  <h1>BARAJA<br><span>EDITOR</span></h1>
  <div class="subtitle">
    pregunta / respuesta correcta<br>
    dos respuestas incorrectas<br>
    → <strong style="color:var(--text)">preguntas.js</strong>
  </div>
</div>

<div class="main">

  <!-- Editor card -->
  <div class="card" id="editorCard">
    <div class="card-header">
      <span class="card-label">✦ Registro activo</span>
      <span class="counter-badge" id="counterBadge"><span id="currentIdx">—</span> / <span id="totalCount">0</span></span>
    </div>

    <div class="field">
      <label><span class="dot dot-q"></span>pregunta</label>
      <input type="text" id="f_pregunta" placeholder="Ej: SAPO" oninput="syncField('pregunta', this.value)">
    </div>
    <div class="field">
      <label><span class="dot dot-ok"></span>respCorrecta</label>
      <input type="text" id="f_respCorrecta" placeholder="Ej: ANFIBIO ANURO" oninput="syncField('respCorrecta', this.value)">
    </div>
    <div class="field">
      <label><span class="dot dot-no"></span>respIncorrecta</label>
      <input type="text" id="f_respIncorrecta" placeholder="Ej: ANFIBIO URODELO" oninput="syncField('respIncorrecta', this.value)">
    </div>
    <div class="field">
      <label><span class="dot dot-no2"></span>respIncorrecta2</label>
      <input type="text" id="f_respIncorrecta2" placeholder="Ej: REPTIL SAURIO" oninput="syncField('respIncorrecta2', this.value)">
    </div>
  </div>

  <!-- Controls -->
  <div class="controls">
    <button class="btn btn-nav" id="btnPrev" onclick="navigate(-1)" title="Anterior" disabled>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><polyline points="15 18 9 12 15 6"/></svg>
      Prev
    </button>
    <button class="btn btn-nav" id="btnNext" onclick="navigate(1)" title="Siguiente" disabled>
      Sig
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><polyline points="9 18 15 12 9 6"/></svg>
    </button>
    <button class="btn btn-delete" id="btnDelete" onclick="deleteRecord()" disabled>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/></svg>
      Eliminar
    </button>
    <button class="btn btn-add" onclick="addRecord()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      Nuevo
    </button>
  </div>

  <div class="divider"></div>

  <!-- List preview -->
  <div class="list-card">
    <div class="list-header">▸ Todos los registros</div>
    <div id="listContainer"><div class="list-empty">— Sin registros —</div></div>
  </div>

  <!-- Generate -->
  <button class="btn btn-generate" onclick="generateFile()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" style="width:18px;height:18px;stroke-width:2.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
    Generar preguntas.js
  </button>

</div>

<div class="toast" id="toast"></div>

<script>
  let baraja = [];
  let current = -1;

  // ─── DATA ───────────────────────────────────────────
  function addRecord() {
    const rec = { pregunta: '', respCorrecta: '', respIncorrecta: '', respIncorrecta2: '' };
    baraja.push(rec);
    current = baraja.length - 1;
    render();
    document.getElementById('f_pregunta').focus();
    showToast('Nuevo registro creado');
  }

  function deleteRecord() {
    if (current < 0 || baraja.length === 0) return;
    baraja.splice(current, 1);
    if (baraja.length === 0) { current = -1; }
    else if (current >= baraja.length) { current = baraja.length - 1; }
    render();
    showToast('Registro eliminado');
  }

  function navigate(dir) {
    current = Math.max(0, Math.min(baraja.length - 1, current + dir));
    render();
  }

  function goTo(idx) {
    current = idx;
    render();
  }

  function syncField(field, value) {
    if (current >= 0) {
      baraja[current][field] = value;
      renderList(); // update list without resetting inputs
    }
  }

  // ─── RENDER ─────────────────────────────────────────
  function render() {
    const total = baraja.length;

    document.getElementById('totalCount').textContent = total;
    document.getElementById('currentIdx').textContent = total === 0 ? '—' : current + 1;

    document.getElementById('btnPrev').disabled = (current <= 0);
    document.getElementById('btnNext').disabled = (current >= total - 1);
    document.getElementById('btnDelete').disabled = (total === 0);

    const fields = ['pregunta', 'respCorrecta', 'respIncorrecta', 'respIncorrecta2'];
    if (current >= 0 && baraja[current]) {
      const rec = baraja[current];
      fields.forEach(f => {
        document.getElementById('f_' + f).value = rec[f] || '';
        document.getElementById('f_' + f).disabled = false;
      });
    } else {
      fields.forEach(f => {
        document.getElementById('f_' + f).value = '';
        document.getElementById('f_' + f).disabled = true;
      });
    }

    renderList();
  }

  function renderList() {
    const container = document.getElementById('listContainer');
    if (baraja.length === 0) {
      container.innerHTML = '<div class="list-empty">— Sin registros —</div>';
      return;
    }
    container.innerHTML = baraja.map((rec, i) => `
      <div class="list-item ${i === current ? 'active' : ''}" onclick="goTo(${i})">
        <span class="list-num">${String(i + 1).padStart(2, '0')}</span>
        <span class="list-pregunta">${escHtml(rec.pregunta) || '<em style="color:#333;font-style:normal">—</em>'}</span>
        <div class="list-tags">
          <span class="tag tag-ok" title="${escHtml(rec.respCorrecta)}">${escHtml(rec.respCorrecta) || '…'}</span>
          <span class="tag tag-no" title="${escHtml(rec.respIncorrecta)}">${escHtml(rec.respIncorrecta) || '…'}</span>
        </div>
      </div>
    `).join('');
  }

  // ─── GENERATE ────────────────────────────────────────
  function generateFile() {
    if (baraja.length === 0) { showToast('⚠ No hay registros'); return; }
    const lines = baraja.map(rec =>
      `  { pregunta: ${JSON.stringify(rec.pregunta)}, respCorrecta: ${JSON.stringify(rec.respCorrecta)}, respIncorrecta: ${JSON.stringify(rec.respIncorrecta)}, respIncorrecta2: ${JSON.stringify(rec.respIncorrecta2)} }`
    ).join(',\n');
    const content = `var baraja = [\n${lines}\n];\n`;

    const blob = new Blob([content], { type: 'application/javascript' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'preguntas.js';
    a.click();
    URL.revokeObjectURL(url);
    showToast(`✓ preguntas.js generado (${baraja.length} registros)`);
  }

  // ─── UTILS ───────────────────────────────────────────
  function escHtml(str) {
    return (str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  let toastTimer;
  function showToast(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => el.classList.remove('show'), 2200);
  }

  // ─── KEYBOARD ────────────────────────────────────────
  document.addEventListener('keydown', e => {
    if (document.activeElement.tagName === 'INPUT') {
      if (e.key === 'Enter') {
        // Move to next field or navigate
        const inputs = ['f_pregunta','f_respCorrecta','f_respIncorrecta','f_respIncorrecta2'];
        const idx = inputs.indexOf(document.activeElement.id);
        if (idx < inputs.length - 1) {
          document.getElementById(inputs[idx + 1]).focus();
        }
      }
      return;
    }
    if (e.key === 'ArrowLeft' && current > 0) navigate(-1);
    if (e.key === 'ArrowRight' && current < baraja.length - 1) navigate(1);
    if (e.key === 'n' || e.key === 'N') addRecord();
  });

  // init
  render();
</script>
</body>
</html>
